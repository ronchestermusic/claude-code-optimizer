<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="claude-code-optimizer · keep your AI dev stack sharp">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#14181d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F8FFF"/>
      <stop offset="100%" stop-color="#7AA2F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.7">
      <stop offset="0%" stop-color="#4F8FFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4F8FFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <!-- terminal chrome -->
  <g>
    <circle cx="56" cy="48" r="9" fill="#ff5f57"/>
    <circle cx="84" cy="48" r="9" fill="#febc2e"/>
    <circle cx="112" cy="48" r="9" fill="#28c840"/>
    <text x="600" y="54" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#545d68">~/.claude/skills/claude-code-optimizer</text>
  </g>

  <!-- prompt line -->
  <text x="60" y="130" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#8b96a3">
    <tspan fill="#7AA2F7">~</tspan> <tspan fill="#7ee787">$</tspan> <tspan fill="#e6edf3">claude /claude-code-optimizer</tspan>
  </text>

  <!-- title -->
  <text x="60" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="700" font-size="62" fill="#e6edf3" letter-spacing="-1">
    claude-code-optimizer
  </text>

  <!-- accent bar -->
  <rect x="60" y="240" width="120" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- subtitle -->
  <text x="60" y="285" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#a3c5ff">
    keep your AI dev stack sharp
  </text>

  <!-- meta -->
  <text x="60" y="318" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#545d68">
    v0.1  ·  codename stackshift  ·  MIT  ·  by Ron Chester · artist + studio owner · Toronto
  </text>
</svg>
